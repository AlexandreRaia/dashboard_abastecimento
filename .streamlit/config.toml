[theme]
# Configure dark theme colors
primaryColor = "#00d4aa"
backgroundColor = "#0a121b"
secondaryBackgroundColor = "#162436"
textColor = "#e7eef8"
font = "sans serif"

[client]
# Disable client.showErrorDetails to reduce console noise
showErrorDetails = false

[logger]
level = "error"

[ui]
# Reduce scroll friction
hideTopBar = false

[browser]
# Enable sharing
gatherUsageStats = false
